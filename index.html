<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <title>Menu Bolos</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="forms">
      <h1>Menu bolos 🍰</h1>

      <!-- TAMANHO -->
      <button id="openTamanho" class="btn-recheio" type="button">
        Selecionar Tamanho
      </button>

      <!-- MASSA -->

      <button id="openMassa" class="btn-recheio" type="button">
        Selecionar Massa
      </button>

      <!-- RECHEIO -->
      <button id="openDialog" class="btn-recheio" type="button">
        Selecionar Recheio
      </button>

      <!-- COBERTURA -->

      <button id="openCobertura" class="btn-recheio" type="button">
        Selecionar Cobertura
      </button>

      <!-- 🔥 NOVO: ADICIONAIS -->
      <button id="openAdicionais" class="btn-recheio" type="button">
        Selecionar Adicionais
      </button>

      <!-- DECORAÇÃO -->
      <button id="openDecor" class="btn-recheio" type="button">
        Selecionar Decoração
      </button>


      <!-- 🔥 NOVO: DATA -->
      <div class="input-group">
        <label for="dataEntrega">📅 Data de entrega</label>
        <input type="date" name="dataEntrega" id="dataEntrega" required>
      </div>

      <!-- WHATS -->
      <button id="whatsappBtn" class="btn-whats" type="button">
        Enviar para WhatsApp
      </button>
    </div>
  </div>

  <!-- MODAL RECHEIOS -->
  <dialog id="dialogRadio">
    <h2>Escolha até 2 recheios</h2>
    <div class="lista-recheios">
      <label><input type="checkbox" name="recheioCheck" value="Beijinho"> Beijinho</label>
      <label><input type="checkbox" name="recheioCheck" value="Brigadeiro Gourmet"> Brigadeiro Gourmet</label>
      <label><input type="checkbox" name="recheioCheck" value="Chocolate Branco"> Chocolate Branco</label>
      <label><input type="checkbox" name="recheioCheck" value="Creme Belga"> Creme Belga</label>
      <label><input type="checkbox" name="recheioCheck" value="Creme de Abacaxi"> Creme de Abacaxi</label>
      <label><input type="checkbox" name="recheioCheck" value="Creme de Brigadeiro Meio Amargo"> Creme de Brigadeiro
        Meio Amargo</label>
      <label><input type="checkbox" name="recheioCheck" value="Creme de Frutas"> Creme de Frutas</label>
      <label><input type="checkbox" name="recheioCheck" value="Ganache"> Ganache</label>
      <label><input type="checkbox" name="recheioCheck" value="La Creme de Baunilha"> La Creme de Baunilha</label>
      <label><input type="checkbox" name="recheioCheck" value="La Creme de Chocolate"> La Creme de Chocolate</label>
      <label><input type="checkbox" name="recheioCheck" value="Moça Cremosa"> Moça Cremosa</label>
      <label><input type="checkbox" name="recheioCheck" value="Morangurte"> Morangurte</label>
      <label><input type="checkbox" name="recheioCheck" value="Mousse de Chocolate"> Mousse de Chocolate</label>
      <label><input type="checkbox" name="recheioCheck" value="Mousse de Doce de Leite"> Mousse de Doce de Leite</label>
      <label><input type="checkbox" name="recheioCheck" value="Mousse de Limão"> Mousse de Limão</label>
      <label><input type="checkbox" name="recheioCheck" value="Mousse de Maracujá"> Mousse de Maracujá</label>
      <label><input type="checkbox" name="recheioCheck" value="Ninho"> Ninho</label>
      <label><input type="checkbox" name="recheioCheck" value="Nutella"> Nutella</label>
      <label><input type="checkbox" name="recheioCheck" value="Paçoca"> Paçoca</label>
      <label><input type="checkbox" name="recheioCheck" value="Pistache"> Pistache</label>
      <label><input type="checkbox" name="recheioCheck" value="Prestígio"> Prestígio</label>
      <label><input type="checkbox" name="recheioCheck" value="Quatro Leites"> Quatro Leites</label>
      <label><input type="checkbox" name="recheioCheck" value="Sensação"> Sensação</label>
      <label><input type="checkbox" name="recheioCheck" value="Trufado"> Trufado</label>
    </div>
    <div class="dialog-botoes">
      <button id="fechar">Cancelar</button>
      <button id="salvar" class="btn-salvar">Salvar</button>
    </div>
  </dialog>

  <!-- 🔥 MODAL ADICIONAIS -->
  <dialog id="dialogAdicionais">
    <h2>Escolha adicionais</h2>

    <div class="lista-recheios">
      <label><input type="checkbox" name="adicionalCheck" value="Nenhum"> Nenhum</label>
      <label><input type="checkbox" name="adicionalCheck" value="Nozes"> Nozes</label>
      <label><input type="checkbox" name="adicionalCheck" value="Ameixa"> Ameixa</label>
      <label><input type="checkbox" name="adicionalCheck" value="Morango"> Morango</label>
      <label><input type="checkbox" name="adicionalCheck" value="Coco"> Coco</label>
      <label><input type="checkbox" name="adicionalCheck" value="Pistache"> Pistache</label>
      <label><input type="checkbox" name="adicionalCheck" value="Cereja"> Cereja</label>
      <label><input type="checkbox" name="adicionalCheck" value="Raspas chocolate branco"> Raspas chocolate
        branco</label>
      <label><input type="checkbox" name="adicionalCheck" value="Raspas chocolate ao leite"> Raspas chocolate ao
        leite</label>
    </div>

    <div class="dialog-botoes">
      <button id="fecharAdicionais">Cancelar</button>
      <button id="salvarAdicionais" class="btn-salvar">Salvar</button>
    </div>
  </dialog>

  <!-- Modal Decoração-->
  <dialog id="dialogDecor">
    <h2>Escolha Decoração</h2>

    <div class="lista-recheios">
      <label><input type="checkbox" name="decorCheck" value="Nenhum"> Nenhum</label>
      <label><input type="checkbox" name="decorCheck" value="Papel Arroz">Papel Arroz</label>
      <label><input type="checkbox" name="decorCheck" value="Topper Básico">Topper Básico</label>
      <label><input type="checkbox" name="decorCheck" value="Topper Elaborado">Topper Elaborado</label>
      <label><input type="checkbox" name="decorCheck" value="Inspiração">Inspiração</label>
    </div>

    <div class="dialog-botoes">
      <button id="fecharDecor">Cancelar</button>
      <button id="salvarDecor" class="btn-salvar">Salvar</button>
    </div>
  </dialog>

  <!--Modal Massa-->
  <dialog id="dialogMassa">
    <h2>Escolha a Massa</h2>

    <div class="lista-recheios">
      <label><input type="checkbox" name="massaCheck" value="Baunilha">Baunilha</label>
      <label><input type="checkbox" name="massaCheck" value="Cacau">Cacau</label>
      <label><input type="checkbox" name="massaCheck" value="Red Velvet">Red Velvet</label>
    </div>

    <div class="dialog-botoes">
      <button id="fecharMassa">Cancelar</button>
      <button id="salvarMassa" class="btn-salvar">Salvar</button>
    </div>
  </dialog>


  <!--Modal Cobertura-->
  <dialog id="dialogCobertura">
    <h2>Escolha a Cobertura</h2>

    <div class="lista-recheios">
      <label><input type="checkbox" name="coberturaCheck" value="Chantilly">Chantilly</label>
      <label><input type="checkbox" name="coberturaCheck" value="Brigadeiro Tradicional">Brigadeiro Tradicional</label>
      <label><input type="checkbox" name="coberturaCheck" value="Ganache">Ganache</label>
    </div>

    <div class="dialog-botoes">
      <button id="fecharCobertura">Cancelar</button>
      <button id="salvarCobertura" class="btn-salvar">Salvar</button>
    </div>
  </dialog>


  <!--Modal Tamanhos-->
  <dialog id="dialogTamanho">
    <h2>Escolha o Tamanho</h2>

    <div class="lista-recheios">
      <p><strong>Redondo</strong></p>
      <label><input type="checkbox" name="tamanhoCheck" value="Bentô - 10cm">Bentô - 10cm</label>
      <label><input type="checkbox" name="tamanhoCheck" value="10 fatias - 20cm">10 fatias - 20cm</label>
      <label><input type="checkbox" name="tamanhoCheck" value="20 fatias - 24cm">20 fatias - 24cm</label>
      <label><input type="checkbox" name="tamanhoCheck" value="25 fatias - 27cm">25 fatias - 27cm</label>
      <label><input type="checkbox" name="tamanhoCheck" value="40 fatias - 30cm">40 fatias - 30cm</label>
      <label><input type="checkbox" name="tamanhoCheck" value="50 fatias - 34cm">50 fatias - 34cm</label>
<br>
      <p><strong>Retangular</strong></p>
      <label><input type="checkbox" name="tamanhoCheck" value="25 fatias - 27x18">25 fatias - 27x18</label>
      <label><input type="checkbox" name="tamanhoCheck" value="30 fatias - 30x20">30 fatias - 30x20</label>
      <label><input type="checkbox" name="tamanhoCheck" value="40 fatias - 34x22">40 fatias - 34x22</label>
      <label><input type="checkbox" name="tamanhoCheck" value="50 fatias - 37x25">50 fatias - 37x25</label>
      <label><input type="checkbox" name="tamanhoCheck" value="70 fatias - 37x31">70 fatias - 37x31</label>
      <label><input type="checkbox" name="tamanhoCheck" value="110 fatias - 37x50">110 fatias -37x50</label>
    </div>

    <div class="dialog-botoes">
      <button id="fecharTamanho">Cancelar</button>
      <button id="salvarTamanho" class="btn-salvar">Salvar</button>
    </div>
  </dialog>



  <script src="logic.js" defer></script>
</body>

</html>
